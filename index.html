<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Deployment Notice</title>
  <meta
    name="description"
    content="This repository uses a Vite build deployed from the gh-pages branch."
  />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0f;
      --card: rgba(255, 255, 255, 0.05);
      --border: rgba(0, 245, 255, 0.2);
      --text: #f5f7ff;
      --muted: #a9b1c7;
      --accent: #00f5ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(0, 245, 255, 0.12), transparent 35%),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(680px, 100%);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 2.8rem);
      color: var(--accent);
    }

    p {
      margin: 0 0 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    code {
      color: var(--text);
      font-family: "JetBrains Mono", "Fira Code", monospace;
    }
  </style>
</head>
<body>
  <main>
    <h1>Wrong Pages source detected</h1>
    <p>
      This repository is built with Vite from <code>src/</code> and published from the
      <code>gh-pages</code> branch.
    </p>
    <p>
      If this page appears on GitHub Pages, the repository Pages setting is likely pointing
      to <code>main</code> instead of <code>gh-pages</code>.
    </p>
    <p>
      Fix it in GitHub: <strong>Settings → Pages → Branch → gh-pages / (root)</strong>.
    </p>
  </main>
</body>
</html>
