<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Your Name</title>
  <meta name="description" content="Full Stack Developer · CS Student · Builder of Things" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

  <!-- Devicons for skill icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'monospace'],
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            bg: '#0a0a0f',
            surface: 'rgba(255,255,255,0.04)',
            cyan: '#00f5ff',
            green: '#39ff14',
            purple: '#bf00ff',
          }
        }
      }
    }
  </script>

  <style>
    /* ─── Root & Reset ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.04);
      --cyan: #00f5ff;
      --green: #39ff14;
      --purple: #bf00ff;
      --text: #ffffff;
      --text-sec: #a0a0b0;
      --border: rgba(0,245,255,0.15);
      --card-shadow: 0 0 24px rgba(0,245,255,0.06), inset 0 1px 0 rgba(255,255,255,0.08);
      --transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      cursor: none;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ─── Dot Matrix Background ─────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,245,255,0.12) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Custom Cursor ──────────────────────────────── */
    #cursor-dot {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--cyan);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      transition: width 0.15s, height 0.15s, background 0.15s;
      box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
    }
    #cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1.5px solid rgba(0,245,255,0.6);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99998;
      transform: translate(-50%, -50%);
      transition: width 0.25s cubic-bezier(0.23,1,0.32,1),
                  height 0.25s cubic-bezier(0.23,1,0.32,1),
                  border-color 0.25s,
                  box-shadow 0.25s;
    }
    body.cursor-hover #cursor-dot { width: 6px; height: 6px; }
    body.cursor-hover #cursor-ring {
      width: 52px; height: 52px;
      border-color: var(--cyan);
      box-shadow: 0 0 16px rgba(0,245,255,0.4);
    }

    /* ─── Page Loader ────────────────────────────────── */
    #page-loader {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 99990;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    #loader-bar-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.05);
      z-index: 99991;
    }
    #loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      box-shadow: 0 0 12px var(--cyan);
      transition: width 0.05s linear;
    }
    #loader-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--cyan);
      letter-spacing: 0.12em;
    }
    #loader-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-sec);
      letter-spacing: 0.08em;
    }

    /* ─── Three.js Canvas ────────────────────────────── */
    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* ─── Glassmorphism Card ─────────────────────────── */
    .glass-card {
      background: var(--surface);
      backdrop-filter: blur(14px) saturate(160%);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--card-shadow);
      transition: var(--transition);
    }
    .glass-card:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 40px rgba(0,245,255,0.18), 0 0 80px rgba(0,245,255,0.06),
                  inset 0 1px 0 rgba(255,255,255,0.12);
      transform: translateY(-4px);
    }

    /* ─── Neon Text ──────────────────────────────────── */
    .neon-cyan {
      color: var(--cyan);
      text-shadow: 0 0 8px rgba(0,245,255,0.6), 0 0 24px rgba(0,245,255,0.3);
    }
    .neon-green { color: var(--green); text-shadow: 0 0 8px rgba(57,255,20,0.5); }
    .neon-purple { color: var(--purple); text-shadow: 0 0 8px rgba(191,0,255,0.5); }

    /* Flicker animation for the hero name */
    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; text-shadow: 0 0 12px rgba(0,245,255,0.8), 0 0 40px rgba(0,245,255,0.4); }
      96% { opacity: 0.85; text-shadow: none; }
      97% { opacity: 1; text-shadow: 0 0 12px rgba(0,245,255,0.8); }
      98% { opacity: 0.9; }
    }
    .flicker { animation: flicker 6s infinite; }

    @keyframes blink-cursor {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .blink { animation: blink-cursor 0.75s step-end infinite; }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(0,245,255,0.5); }
      70% { box-shadow: 0 0 0 14px rgba(0,245,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,245,255,0); }
    }
    .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.23, 1, 0.32, 1) infinite; }

    @keyframes orbit {
      from { transform: rotate(var(--start-angle)) translateX(var(--orbit-r)) rotate(calc(-1 * var(--start-angle))); }
      to   { transform: rotate(calc(var(--start-angle) + 360deg)) translateX(var(--orbit-r)) rotate(calc(-1 * (var(--start-angle) + 360deg))); }
    }

    /* ─── Navbar ─────────────────────────────────────── */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 1rem 2rem;
      transition: background 0.4s ease, backdrop-filter 0.4s ease, box-shadow 0.4s ease;
    }
    #navbar.scrolled {
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 0 1px 0 rgba(0,245,255,0.1);
    }
    .nav-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-sec);
      text-decoration: none;
      position: relative;
      padding-bottom: 4px;
      transition: color 0.3s;
      letter-spacing: 0.06em;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      transition: width 0.3s cubic-bezier(0.23,1,0.32,1);
    }
    .nav-link:hover { color: var(--cyan); }
    .nav-link:hover::after { width: 100%; }
    .nav-link.active { color: var(--cyan); }
    .nav-link.active::before {
      content: '▸';
      position: absolute;
      left: -14px;
      color: var(--cyan);
      font-size: 0.65rem;
      top: 50%; transform: translateY(-50%);
      text-shadow: 0 0 6px var(--cyan);
    }

    /* ─── Hamburger ──────────────────────────────────── */
    #hamburger { cursor: pointer; }
    #hamburger span {
      display: block; width: 24px; height: 2px;
      background: var(--text-sec);
      margin: 5px 0;
      transition: var(--transition);
      transform-origin: center;
    }
    #hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); background: var(--cyan); }
    #hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    #hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); background: var(--cyan); }
    #mobile-menu {
      position: fixed; top: 0; right: 0;
      width: min(85vw, 320px); height: 100vh;
      background: rgba(10,10,15,0.97);
      backdrop-filter: blur(24px);
      z-index: 999;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 2.5rem;
      padding: 2rem;
    }
    #mobile-menu.open { transform: translateX(0); }

    /* ─── Section Styles ──────────────────────────────── */
    section { position: relative; z-index: 1; }

    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--cyan);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    .section-heading {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
    }
    .reveal-line {
      height: 1px;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      width: 0;
      box-shadow: 0 0 8px rgba(0,245,255,0.4);
    }

    /* ─── Buttons ─────────────────────────────────────── */
    .btn-primary {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      padding: 0.75rem 1.75rem;
      background: transparent;
      border: 1.5px solid var(--cyan);
      color: var(--cyan);
      border-radius: 8px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.5rem;
      box-shadow: 0 0 12px rgba(0,245,255,0.15);
    }
    .btn-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0,245,255,0.06);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.23,1,0.32,1);
    }
    .btn-primary:hover { box-shadow: 0 0 28px rgba(0,245,255,0.35); transform: translateY(-2px); }
    .btn-primary:hover::before { transform: scaleX(1); }
    .btn-ghost {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      padding: 0.75rem 1.75rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-sec);
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-ghost:hover { border-color: rgba(0,245,255,0.3); color: var(--text); transform: translateY(-2px); }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,245,255,0.25);
      transform: scale(0);
      animation: ripple-anim 0.6s linear;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* ─── Hero Decorations ─────────────────────────────── */
    .hero-bracket {
      font-family: 'JetBrains Mono', monospace;
      position: absolute;
      font-size: clamp(4rem, 12vw, 10rem);
      opacity: 0.04;
      color: var(--cyan);
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }

    /* ─── Skill Badges ────────────────────────────────── */
    .skill-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      padding: 0.35rem 0.85rem;
      background: var(--surface);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-sec);
      transition: var(--transition);
      display: inline-flex; align-items: center; gap: 0.4rem;
      white-space: nowrap;
    }
    .skill-badge:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 12px rgba(0,245,255,0.25);
      transform: translateY(-2px);
    }

    /* ─── Terminal Box ────────────────────────────────── */
    .terminal-box {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      overflow: hidden;
    }
    .terminal-topbar {
      background: rgba(255,255,255,0.04);
      padding: 0.5rem 1rem;
      display: flex; align-items: center; gap: 0.5rem;
      border-bottom: 1px solid rgba(0,245,255,0.1);
    }
    .terminal-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .terminal-body { padding: 1rem 1.25rem; line-height: 2; }
    .terminal-line { display: flex; align-items: center; gap: 0.5rem; }
    .terminal-prompt { color: var(--cyan); }
    .terminal-label { color: var(--purple); }
    .terminal-value { color: var(--text); }
    .progress-bar-track {
      display: inline-block;
      width: 120px; height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
      vertical-align: middle;
      margin: 0 4px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      border-radius: 4px;
      width: 0%;
      transition: width 1.2s cubic-bezier(0.23,1,0.32,1);
      box-shadow: 0 0 6px var(--cyan);
    }

    /* ─── Avatar Frame ────────────────────────────────── */
    .avatar-frame {
      position: relative;
      width: 220px; height: 220px;
      margin: 0 auto;
    }
    .avatar-hex {
      width: 100%; height: 100%;
      clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
      background: linear-gradient(135deg, rgba(0,245,255,0.15), rgba(191,0,255,0.15));
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
      overflow: hidden;
    }
    .avatar-hex img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-glow-ring {
      position: absolute; inset: -8px;
      clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
      border: 2px solid rgba(0,245,255,0.4);
      animation: pulse-ring 3s cubic-bezier(0.23,1,0.32,1) infinite;
    }

    /* ─── Orbit Icons ────────────────────────────────── */
    .orbit-icon {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.7;
      animation: orbit var(--orbit-duration, 12s) linear infinite;
    }

    /* ─── Course Cards ───────────────────────────────── */
    .course-card {
      position: relative;
      transition: var(--transition);
    }
    .course-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
      background: var(--accent-color, var(--cyan));
      box-shadow: 0 0 10px var(--accent-color, var(--cyan));
    }
    .course-card.dimmed { opacity: 0.45; pointer-events: none; }
    .course-activities {
      overflow: hidden;
      height: 0;
    }

    /* ─── Activity Cards ──────────────────────────────── */
    .activity-card {
      cursor: pointer;
      min-width: 220px;
    }
    .activity-thumb {
      width: 100%; height: 120px;
      object-fit: cover;
      border-radius: 8px;
      background: rgba(0,245,255,0.05);
      overflow: hidden;
      position: relative;
    }
    .activity-thumb-img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .activity-card:hover .activity-thumb-img { transform: scale(1.05); }
    .activity-thumb-overlay {
      position: absolute; inset: 0;
      background: rgba(0,245,255,0.15);
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 8px;
    }
    .activity-card:hover .activity-thumb-overlay { opacity: 1; }

    /* ─── Modal ──────────────────────────────────────── */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      z-index: 5000;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal-container {
      background: rgba(10,10,20,0.97);
      backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 900px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.23,1,0.32,1);
      position: relative;
    }
    #modal-overlay.open #modal-container { transform: translateY(0); }
    #modal-close {
      position: absolute; top: 1.25rem; right: 1.25rem;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-sec);
      font-size: 1rem;
      transition: var(--transition);
    }
    #modal-close:hover { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 12px rgba(0,245,255,0.3); }

    /* ─── Gallery ─────────────────────────────────────── */
    .gallery-wrapper { position: relative; overflow: hidden; border-radius: 12px; }
    .gallery-track { display: flex; transition: transform 0.5s cubic-bezier(0.23,1,0.32,1); }
    .gallery-slide { min-width: 100%; }
    .gallery-slide img {
      width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px;
    }
    .gallery-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,245,255,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--cyan);
      transition: var(--transition);
      z-index: 10;
    }
    .gallery-nav:hover { background: rgba(0,245,255,0.15); box-shadow: 0 0 12px rgba(0,245,255,0.3); }
    .gallery-nav.prev { left: 12px; }
    .gallery-nav.next { right: 12px; }
    .gallery-dots { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }
    .gallery-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      cursor: pointer; transition: background 0.3s, box-shadow 0.3s;
    }
    .gallery-dot.active { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }

    /* ─── Shimmer Placeholder ─────────────────────────── */
    .shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer-anim 1.5s infinite;
    }
    @keyframes shimmer-anim {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* ─── Scrollbar ──────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(0,245,255,0.25); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,245,255,0.5); }

    /* ─── Utility ─────────────────────────────────────── */
    .gsap-hidden { opacity: 0; }
    .overflow-scroll-x { overflow-x: auto; scrollbar-width: thin; }

    /* ─── Media Queries ───────────────────────────────── */
    @media (max-width: 768px) {
      .section-heading { font-size: clamp(1.6rem, 7vw, 2.4rem); }
      #modal-container { border-radius: 20px 20px 0 0; padding: 1.5rem; max-height: 95vh; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <!-- ═══════════════════════════════════════════════════
       PAGE LOADER
  ═══════════════════════════════════════════════════ -->
  <div id="loader-bar-wrap"><div id="loader-bar"></div></div>
  <div id="page-loader">
    <div id="loader-text">Initializing portfolio<span class="blink">_</span></div>
    <div id="loader-sub">[ Loading assets... ]</div>
  </div>

  <!-- ═══════════════════════════════════════════════════

  (function initLoader() {
    const bar = document.getElementById('loader-bar');
    const loader = document.getElementById('page-loader');
    const steps = ['Parsing assets...', 'Initializing canvas...', 'Booting systems...', 'Portfolio ready.'];
    let step = 0;

    const interval = setInterval(() => {
      progress += (Math.random() * 22 + 8);
      if (progress > 100) progress = 100;
      bar.style.width = progress + '%';
      if (step < steps.length - 1 && progress > (step + 1) * 25) {

      if (progress >= 100) {
        clearInterval(interval);

          gsap.to(loader, { opacity: 0, duration: 0.6, ease: 'power2.inOut', onComplete: () => {
            loader.style.display = 'none';

        }, 400);

    }, 80);
  })();

  // ════════════════════════════════════════════════════
  // THREE.JS PARTICLE NETWORK BACKGROUND
  // ════════════════════════════════════════════════════
  (function initThreeBackground() {
    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 400;

    // Particle count based on screen size
    const isMobile = window.innerWidth < 768;
    const PARTICLE_COUNT = isMobile ? 60 : 140;
    const CONNECTION_DISTANCE = isMobile ? 120 : 160;

    // Create particles
    const particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: (Math.random() - 0.5) * window.innerWidth,
        y: (Math.random() - 0.5) * window.innerHeight,
        z: (Math.random() - 0.5) * 200,
        vx: (Math.random() - 0.5) * 0.25,
        vy: (Math.random() - 0.5) * 0.25,
        color: Math.random() > 0.5 ? 0x00f5ff : 0xbf00ff
      });
    }

    // Geometry for points
    const geom = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);

    particles.forEach((p, i) => {
      positions[i * 3] = p.x; positions[i * 3 + 1] = p.y; positions[i * 3 + 2] = p.z;
      const c = new THREE.Color(p.color);
      colors[i * 3] = c.r * 0.6; colors[i * 3 + 1] = c.g * 0.6; colors[i * 3 + 2] = c.b * 0.6;
    });
    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const pointMat = new THREE.PointsMaterial({ size: 2.5, vertexColors: true, transparent: true, opacity: 0.65 });
    const points = new THREE.Points(geom, pointMat);
    scene.add(points);

    // Lines geometry
    const lineGeom = new THREE.BufferGeometry();
    const maxLines = PARTICLE_COUNT * PARTICLE_COUNT;
    const linePositions = new Float32Array(maxLines * 6);
    const lineColors = new Float32Array(maxLines * 6);
    lineGeom.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
    lineGeom.setAttribute('color', new THREE.BufferAttribute(lineColors, 3));
    const lineMat = new THREE.LineSegments(lineGeom, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.3 }));
    scene.add(lineMat);

    let scrollY = 0;
    window.addEventListener('scroll', () => { scrollY = window.scrollY; });

    function animate() {
      requestAnimationFrame(animate);

      // Move particles
      particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy;
        const hw = window.innerWidth / 2, hh = window.innerHeight / 2;
        if (p.x > hw) p.x = -hw; if (p.x < -hw) p.x = hw;
        if (p.y > hh) p.y = -hh; if (p.y < -hh) p.y = hh;
        positions[i * 3] = p.x; positions[i * 3 + 1] = p.y;
      });
      geom.attributes.position.needsUpdate = true;

      // Build connections
      let lineIdx = 0;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        for (let j = i + 1; j < PARTICLE_COUNT; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONNECTION_DISTANCE && lineIdx < maxLines) {
            const alpha = (1 - dist / CONNECTION_DISTANCE) * 0.4;
            const ci = new THREE.Color(particles[i].color);
            const base = lineIdx * 6;
            linePositions[base]     = particles[i].x; linePositions[base + 1] = particles[i].y; linePositions[base + 2] = 0;
            linePositions[base + 3] = particles[j].x; linePositions[base + 4] = particles[j].y; linePositions[base + 5] = 0;
            lineColors[base]     = ci.r * alpha; lineColors[base + 1] = ci.g * alpha; lineColors[base + 2] = ci.b * alpha;
            lineColors[base + 3] = ci.r * alpha; lineColors[base + 4] = ci.g * alpha; lineColors[base + 5] = ci.b * alpha;
            lineIdx++;
          }
        }
      }
      lineGeom.setDrawRange(0, lineIdx * 2);
      lineGeom.attributes.position.needsUpdate = true;
      lineGeom.attributes.color.needsUpdate = true;

      // Parallax
      camera.position.y = -scrollY * 0.04;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  })();

  // ════════════════════════════════════════════════════
  // CUSTOM CURSOR
  // ════════════════════════════════════════════════════
  (function initCursor() {
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mouseX = 0, mouseY = 0;
    let ringX = 0, ringY = 0;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX; mouseY = e.clientY;
      dot.style.left = mouseX + 'px'; dot.style.top = mouseY + 'px';
    });

    function lerp(a, b, t) { return a + (b - a) * t; }
    function animRing() {
      ringX = lerp(ringX, mouseX, 0.12);
      ringY = lerp(ringY, mouseY, 0.12);
      ring.style.left = ringX + 'px'; ring.style.top = ringY + 'px';
      requestAnimationFrame(animRing);
    }
    animRing();

    document.querySelectorAll('a, button, [role="button"], .course-card, .activity-card, .gallery-nav').forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
    });
  })();

  // ════════════════════════════════════════════════════
  // NAVBAR
  // ════════════════════════════════════════════════════
  (function initNav() {
    const nav = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 20);
    });

    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    const mobileClose = document.getElementById('mobile-menu-close');
    hamburger.addEventListener('click', () => { hamburger.classList.toggle('open'); mobileMenu.classList.toggle('open'); });
    mobileClose.addEventListener('click', closeMobileMenu);
    mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMobileMenu));
  })();
  function closeMobileMenu() {
    document.getElementById('hamburger').classList.remove('open');
    document.getElementById('mobile-menu').classList.remove('open');
  }

  // ════════════════════════════════════════════════════
  // RENDER CONTENT FROM DATA
  // ════════════════════════════════════════════════════
  function renderContent() {
    const { hero, about, projects } = portfolioData;

    // Hero
    document.getElementById('hero-name').textContent = hero.name;
    document.getElementById('hero-title').textContent = hero.title;
    document.querySelector('#navbar a').textContent = '<' + hero.name.split(' ').map(w => w[0]).join('') + ' />';

    // About bio
    const bioEl = document.getElementById('about-bio');
    about.bio.forEach(para => {
      const p = document.createElement('p');
      p.textContent = para;
      p.className = 'gsap-hidden';
      p.style.cssText = 'color:var(--text-sec);line-height:1.75;font-size:0.92rem;';
      bioEl.appendChild(p);
    });

    // Skills
    const skillsEl = document.getElementById('skills-container');
    about.skills.forEach(skill => {
      const badge = document.createElement('span');
      badge.className = 'skill-badge gsap-hidden';
      badge.innerHTML = `<i class="${skill.icon}" style="font-size:1rem;"></i>${skill.name}`;
      skillsEl.appendChild(badge);
    });

    // Terminal
    const tbody = document.getElementById('terminal-body');
    about.terminalLines.forEach(line => {
      const div = document.createElement('div');
      div.className = 'terminal-line';
      if (line.type === 'progress') {
        div.innerHTML = `<span class="terminal-prompt">></span> <span class="terminal-label">${line.label}</span><span style="color:var(--text-sec);">:</span> <span class="progress-bar-track"><span class="progress-bar-fill" data-value="${line.value}"></span></span><span class="terminal-value" style="margin-left:6px;font-size:0.65rem;color:var(--text-sec);">${line.value}%</span>`;
      } else {
        div.innerHTML = `<span class="terminal-prompt">></span> <span class="terminal-label">${line.label}</span><span style="color:var(--text-sec);">:</span> <span class="terminal-value" style="margin-left:4px;">${line.value}</span>`;
      }
      tbody.appendChild(div);
    });

    // Courses grid
    renderCoursesGrid(projects);
  }

  function renderCoursesGrid(projects) {
    const grid = document.getElementById('courses-grid');
    grid.innerHTML = '';
    projects.forEach((course, idx) => {
      const card = document.createElement('div');
      card.className = 'glass-card course-card gsap-hidden p-6 cursor-pointer select-none';
      card.style.setProperty('--accent-color', course.accentColor);
      card.dataset.courseId = course.id;
      card.innerHTML = `
        <div class="flex items-start justify-between mb-2">
          <span class="font-mono text-xs" style="color:${course.accentColor};letter-spacing:0.1em;">${course.courseCode}</span>
          <svg class="chevron-icon transition-transform duration-300" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${course.accentColor}" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <h3 class="font-mono font-semibold text-sm mb-2" style="color:var(--text);">${course.courseName}</h3>
        <p class="font-sans text-xs" style="color:var(--text-sec);">${course.description}</p>
        <div class="course-activities" id="activities-${course.id}"></div>
      `;
      card.addEventListener('click', (e) => {
        if (e.target.closest('#activities-' + course.id) && !e.target.closest('.activity-card')) toggleCourse(course.id, projects);
        else if (!e.target.closest('.activity-card')) toggleCourse(course.id, projects);
      });
      grid.appendChild(card);
    });
  }

  let activeCourseId = null;
  function toggleCourse(courseId, projects) {
    const course = projects.find(c => c.id === courseId);
    const allCards = document.querySelectorAll('.course-card');
    const activitiesEl = document.getElementById('activities-' + courseId);
    const card = activitiesEl.closest('.course-card');
    const chevron = card.querySelector('.chevron-icon');
    const isOpen = activeCourseId === courseId;

    // Close existing
    if (activeCourseId) {
      const prevActivities = document.getElementById('activities-' + activeCourseId);
      const prevCard = prevActivities.closest('.course-card');
      gsap.to(prevActivities, { height: 0, duration: 0.4, ease: 'power2.inOut', onComplete: () => { prevActivities.innerHTML = ''; } });
      prevCard.querySelector('.chevron-icon').style.transform = '';
      prevCard.style.borderColor = '';
    }

    // Restore all cards
    allCards.forEach(c => c.classList.remove('dimmed'));
    activeCourseId = null;

    if (!isOpen) {
      activeCourseId = courseId;
      // Dim others
      allCards.forEach(c => { if (c.dataset.courseId !== courseId) c.classList.add('dimmed'); });
      chevron.style.transform = 'rotate(180deg)';
      card.style.borderColor = course.accentColor;

      // Render activity cards
      activitiesEl.innerHTML = `<div class="mt-5 overflow-x-auto flex gap-3 pb-3" style="scrollbar-width:thin;" id="act-row-${courseId}"></div>`;
      const row = document.getElementById('act-row-' + courseId);
      course.activities.forEach(act => {
        const hasImage = act.images && act.images.length > 0;
        const ac = document.createElement('div');
        ac.className = 'glass-card activity-card flex-shrink-0 p-3';
        ac.style.cssText = 'width:200px;opacity:0;transform:translateY(12px);';
        ac.innerHTML = `
          <div class="activity-thumb mb-2">
            ${hasImage
              ? `<img class="activity-thumb-img shimmer" src="${act.images[0].src}" alt="${act.title}" loading="lazy" onload="this.classList.remove('shimmer')" onerror="this.src='';this.style.display='none';" />`
              : `<div style="width:100%;height:100%;background:linear-gradient(135deg,rgba(0,245,255,0.06),rgba(191,0,255,0.06));display:flex;align-items:center;justify-content:center;font-size:2rem;">💻</div>`}
            <div class="activity-thumb-overlay"></div>
          </div>
          <p class="font-mono text-xs font-medium mb-1" style="color:var(--text);line-height:1.4;">${act.title}</p>
          <p class="font-sans" style="font-size:0.65rem;color:var(--text-sec);line-height:1.4;margin-bottom:6px;">${act.teaser}</p>
          <span class="font-mono" style="font-size:0.65rem;color:${course.accentColor};">View Details →</span>
        `;
        ac.addEventListener('click', (e) => { e.stopPropagation(); openModal(act, course); });
        row.appendChild(ac);
      });

      // Animate open
      gsap.fromTo(activitiesEl, { height: 0 }, {
        height: 'auto', duration: 0.45, ease: 'power2.out',
        onComplete: () => {
          gsap.to(row.children, { opacity: 1, y: 0, stagger: 0.08, duration: 0.35, ease: 'power2.out' });
        }
      });
    }
  }

  // ════════════════════════════════════════════════════
  // MODAL
  // ════════════════════════════════════════════════════
  function openModal(activity, course) {
    const overlay = document.getElementById('modal-overlay');
    document.getElementById('modal-breadcrumb').textContent = `Projects → ${course.courseCode} → ${activity.title}`;
    document.getElementById('modal-title').textContent = activity.title;
    document.getElementById('modal-title').style.color = course.accentColor;
    document.getElementById('modal-title').style.textShadow = `0 0 20px ${course.accentColor}50`;
    document.getElementById('modal-description').textContent = activity.description || 'No description provided.';

    const galleryEl = document.getElementById('modal-gallery');
    galleryEl.innerHTML = '';

    if (activity.images && activity.images.length > 1) {
      galleryEl.innerHTML = `
        <div class="gallery-wrapper mb-4" id="gallery-wrap">
          <div class="gallery-track" id="gallery-track">
            ${activity.images.map(img => `
              <div class="gallery-slide">
                <img src="${img.src}" alt="${img.caption}" loading="lazy" onerror="this.closest('.gallery-slide').style.display='none';" />
              </div>`).join('')}
          </div>
          <button class="gallery-nav prev" id="gal-prev">‹</button>
          <button class="gallery-nav next" id="gal-next">›</button>
        </div>
        <p id="gallery-caption" class="font-mono text-xs text-center mb-4" style="color:var(--text-sec);">${activity.images[0].caption}</p>
        <div class="gallery-dots" id="gallery-dots">
          ${activity.images.map((_, i) => `<div class="gallery-dot${i === 0 ? ' active' : ''}" data-idx="${i}"></div>`).join('')}
        </div>`;
      initGallery(activity.images);
    } else if (activity.images && activity.images.length === 1) {
      galleryEl.innerHTML = `
        <img src="${activity.images[0].src}" alt="${activity.images[0].caption}" loading="lazy"
          style="width:100%;max-height:380px;object-fit:cover;border-radius:12px;margin-bottom:8px;"
          onerror="this.style.display='none';" />
        <p class="font-mono text-xs text-center" style="color:var(--text-sec);">${activity.images[0].caption}</p>`;
    } else {
      galleryEl.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text-sec);font-family:'JetBrains Mono',monospace;font-size:0.8rem;">// no images</div>`;
    }

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    const overlay = document.getElementById('modal-overlay');
    document.getElementById('modal-container').style.transform = 'translateY(100%)';
    setTimeout(() => {
      overlay.classList.remove('open');
      document.getElementById('modal-container').style.transform = '';
      document.body.style.overflow = '';
    }, 450);
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  function initGallery(images) {
    let current = 0;
    const track = document.getElementById('gallery-track');
    const dots = document.querySelectorAll('#gallery-dots .gallery-dot');
    const caption = document.getElementById('gallery-caption');

    function goTo(idx) {
      current = (idx + images.length) % images.length;
      gsap.to(track, { x: -current * 100 + '%', duration: 0.5, ease: 'power2.inOut' });
      dots.forEach((d, i) => d.classList.toggle('active', i === current));
      if (caption) caption.textContent = images[current].caption;
    }
    document.getElementById('gal-prev').addEventListener('click', () => goTo(current - 1));
    document.getElementById('gal-next').addEventListener('click', () => goTo(current + 1));
    dots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.idx)));

    // Touch swipe
    let touchStartX = 0;
    const wrap = document.getElementById('gallery-wrap');
    wrap.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
    wrap.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
    });
  }

  // ════════════════════════════════════════════════════
  // RIPPLE EFFECT ON BUTTONS
  // ════════════════════════════════════════════════════
  document.querySelectorAll('.btn-primary').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const r = document.createElement('span');
      r.className = 'ripple';
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
      this.appendChild(r);
      setTimeout(() => r.remove(), 700);
    });
  });

  // ════════════════════════════════════════════════════
  // GSAP ANIMATIONS — Called after loader finishes
  // ════════════════════════════════════════════════════
  function initAnimations() {
    gsap.registerPlugin(ScrollTrigger, TextPlugin);
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // ── Active Nav Highlighting ──
    const sections = ['hero', 'about', 'projects'];
    sections.forEach(id => {
      ScrollTrigger.create({
        trigger: '#' + id,
        start: 'top center',
        end: 'bottom center',
        onEnter: () => setActiveNav(id),
        onEnterBack: () => setActiveNav(id),
      });
    });

    function setActiveNav(id) {
      document.querySelectorAll('.nav-link').forEach(l => {
        l.classList.toggle('active', l.dataset.section === id);
      });
    }

    if (reducedMotion) {
      // Just show everything immediately
      document.querySelectorAll('.gsap-hidden').forEach(el => { el.style.opacity = 1; el.style.transform = 'none'; });
      document.querySelectorAll('.reveal-line').forEach(el => { el.style.width = '100%'; });
      document.querySelectorAll('#hero-name, #hero-title, #hero-cta').forEach(el => { el.style.opacity = 1; });
      return;
    }

    // ── HERO ──────────────────────────────────────────
    const typeText = portfolioData.hero.greeting;
    const greetingEl = document.getElementById('hero-greeting');
    greetingEl.textContent = '';
    let charIdx = 0;
    function typeChar() {
      if (charIdx < typeText.length) {
        greetingEl.textContent = typeText.slice(0, charIdx + 1) + '█';
        charIdx++;
        setTimeout(typeChar, 60 + Math.random() * 40);
      } else {
        greetingEl.innerHTML = typeText + '<span class="blink">█</span>';
        // Reveal name after typing
        gsap.to('#hero-name', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out', delay: 0.3 });
        gsap.fromTo('#hero-name', { y: 30 }, { y: 0, opacity: 1, duration: 0.8, ease: 'power3.out', delay: 0.3 });
        gsap.to('#hero-title', { opacity: 1, duration: 0.8, delay: 0.8, ease: 'power2.out' });
        gsap.fromTo('#hero-title', { y: 20 }, { y: 0, opacity: 1, duration: 0.8, delay: 0.8, ease: 'power2.out' });
        gsap.to('#hero-cta', { opacity: 1, duration: 0.7, delay: 1.3, ease: 'power2.out' });
        gsap.fromTo('#hero-cta', { y: 16 }, { y: 0, opacity: 1, duration: 0.7, delay: 1.3, ease: 'power2.out' });
      }
    }
    setTimeout(typeChar, 600);

    // ── ABOUT ─────────────────────────────────────────
    gsap.from('#about-label', { scrollTrigger: { trigger: '#about-label', start: 'top 85%' }, opacity: 0, y: 20, duration: 0.6, ease: 'power2.out' });
    gsap.from('#about-heading', { scrollTrigger: { trigger: '#about-heading', start: 'top 85%' }, opacity: 0, y: 30, duration: 0.7, delay: 0.1, ease: 'power3.out' });
    gsap.to('#about-line', { scrollTrigger: { trigger: '#about-line', start: 'top 85%' }, width: '100%', duration: 0.9, ease: 'power2.out', delay: 0.2 });

    gsap.utils.toArray('#about-bio p').forEach((p, i) => {
      gsap.from(p, { scrollTrigger: { trigger: p, start: 'top 88%' }, opacity: 0, y: 24, duration: 0.6, delay: i * 0.12, ease: 'power2.out' });
    });

    gsap.from('#skills-label', { scrollTrigger: { trigger: '#skills-label', start: 'top 88%' }, opacity: 0, duration: 0.5 });
    gsap.utils.toArray('.skill-badge').forEach((badge, i) => {
      gsap.from(badge, { scrollTrigger: { trigger: badge, start: 'top 90%' }, opacity: 0, scale: 0.85, y: 10, duration: 0.5, delay: (i % 8) * 0.06, ease: 'back.out(1.5)' });
    });

    gsap.from('#terminal-box', { scrollTrigger: { trigger: '#terminal-box', start: 'top 85%' }, opacity: 0, y: 30, duration: 0.7, ease: 'power2.out', onComplete: () => {
      document.querySelectorAll('.progress-bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.value + '%';
      });
    }});

    gsap.from('#about-visual', { scrollTrigger: { trigger: '#about-visual', start: 'top 80%' }, opacity: 0, x: 40, duration: 0.8, ease: 'power3.out' });

    // ── PROJECTS ───────────────────────────────────────
    gsap.from('#proj-label', { scrollTrigger: { trigger: '#proj-label', start: 'top 85%' }, opacity: 0, y: 20, duration: 0.6 });
    gsap.from('#proj-heading', { scrollTrigger: { trigger: '#proj-heading', start: 'top 85%' }, opacity: 0, y: 30, duration: 0.7, delay: 0.1 });
    gsap.to('#proj-line', { scrollTrigger: { trigger: '#proj-line', start: 'top 85%' }, width: '200px', duration: 0.9, ease: 'power2.out', delay: 0.2 });

    gsap.utils.toArray('.course-card').forEach((card, i) => {
      gsap.from(card, {
        scrollTrigger: { trigger: card, start: 'top 88%' },
        opacity: 0, y: 40, duration: 0.55, delay: (i % 3) * 0.1, ease: 'power2.out'
      });
    });
  }

  // ════════════════════════════════════════════════════
  // INIT
  // ════════════════════════════════════════════════════
  renderContent();
  </script>
</body>
</html>
