<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <rect width="400" height="240" fill="#0a0a0f"/>
  <!-- Fine grid -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(0,245,255,0.08)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="240" fill="url(#grid)"/>
  <!-- Border -->
  <rect x="1" y="1" width="398" height="238" fill="none"
        stroke="rgba(0,245,255,0.18)" stroke-width="1" rx="4"/>
  <!-- Brackets -->
  <text x="30" y="135" font-family="monospace" font-size="48" fill="rgba(0,245,255,0.12)">[</text>
  <text x="340" y="135" font-family="monospace" font-size="48" fill="rgba(0,245,255,0.12)">]</text>
  <!-- Main text -->
  <text x="200" y="112" font-family="monospace" font-size="13"
        fill="rgba(0,245,255,0.5)" text-anchor="middle" letter-spacing="3">// NO PREVIEW</text>
  <text x="200" y="136" font-family="monospace" font-size="11"
        fill="rgba(160,160,176,0.45)" text-anchor="middle" letter-spacing="2">[ image not available ]</text>
</svg>
